# Project-wide Gradle settings
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
# 资源优化已使用默认值 true（AGP 9.0 将移除此配置项）

# Gradle 性能优化
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true

# Kotlin Daemon 配置 — 解决 "Could not connect to Kotlin compile daemon"
kotlin.daemon.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m
kotlin.incremental=true

# 禁用 Configuration Cache（Kotlin 插件兼容性问题）
org.gradle.configuration-cache=false

# ===== APK 体积与运行时优化 =====
# R8 完整模式：更激进的代码缩减、字段/方法内联与类合并（-5% ~ -15% APK 体积）
# 如需回退到兼容模式，将值改为 false
android.enableR8.fullMode=true

# 非最终资源 ID：加快增量构建（不影响运行时）
android.nonFinalResIds=true

# 非传递 R 类（已在上方启用）配合此项可显著加速构建
android.nonTransitiveRClass=true

# 精确资源缩减：更安全地移除未使用的 drawable / string / layout
android.experimental.enableNewResourceShrinker.preciseShrinking=true

# 关闭非必要的依赖元数据写入（减小 APK / AAB 几十 KB）
android.dependency.useConstraints=true
